apiVersion: v1
kind: Pod
metadata:
  name: todoapp
  namespace: todoapp
  labels:
    app: todoapp
    version: "3.0.0"
spec:
  containers:
    - name: todoapp
      image: igorrrrrrrr/todoapp:3.0.0
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      
      # Readiness Probe — перевіряє чи готовий контейнер приймати трафік
      readinessProbe:
        httpGet:
          path: /api/health/ready
          port: http
          scheme: HTTP
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 3
      
      # Liveness Probe — перевіряє чи живий контейнер
      livenessProbe:
        httpGet:
          path: /api/health/live
          port: http
          scheme: HTTP
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 5
      
      # Resource limits
      resources:
        limits:
          memory: "512Mi"
          cpu: "500m"
        requests:
          memory: "256Mi"
          cpu: "250m"
      
      # Environment variables (якщо потрібні)
      env:
        - name: DEBUG
          value: "False"
        - name: ALLOWED_HOSTS
          value: "*"
  
  # Restart policy для поду
  restartPolicy: Never